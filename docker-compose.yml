version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: code_factory
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kanban-ui:
    # Usando Planka ou Plane como representação da interface Kanban
    image: ghcr.io/plankanban/planka:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/code_factory
    depends_on:
      - postgres

  orchestrator:
    build: ./orchestrator
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_BASE_URL=http://ollama:11434
      - LLM_MODEL_NAME=llama3 # Modelo padrão a ser usado
    depends_on:
      - redis

  worker-queue:
    build: ./orchestrator
    command: celery -A core.tasks worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  agents:
    build: ./agents
    depends_on:
      - openclaw
      - mcp-server
    environment:
      - LLM_API_BASE_URL=http://ollama:11434
      - LLM_MODEL_NAME=llama3
      - MCP_URL=http://mcp-server:8000
      - REDIS_URL=redis://redis:6379/0

  mcp-server:
    build: ./mcp-server
    environment:
      - DB_URL=postgresql://admin:admin@postgres:5432/code_factory
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  openclaw:
    # Framework executor de ações
    image: ghcr.io/openclaw/openclaw:latest
    privileged: true # Necessário se for executar docker-in-docker
    environment:
      - WORKSPACE_DIR=/workspace
    volumes:
      - ./workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8081"

volumes:
  pg_data:
  ollama_data: